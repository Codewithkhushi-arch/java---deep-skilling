# Primary Data Source Configuration (Employee DB)
spring.datasource.primary.jdbc-url=jdbc:h2:mem:primarydb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.primary.username=sa
spring.datasource.primary.password=
spring.datasource.primary.driver-class-name=org.h2.Driver

# Secondary Data Source Configuration (Audit / Log DB)
spring.datasource.secondary.jdbc-url=jdbc:h2:mem:secondarydb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.secondary.username=sa
spring.datasource.secondary.password=
spring.datasource.secondary.driver-class-name=org.h2.Driver

# General JPA Properties
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate Batch Processing Configuration (Exercise 10)
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
